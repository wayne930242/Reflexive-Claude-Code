# ----------------------------------------------------------------------
# RCC migration state
# ----------------------------------------------------------------------
migration:
  completed: true
  initial_at: "2026-03-24"           # first RCC migration ever run
  last_at: "2026-04-18"              # most recent migration/refactor
  last_rcc_version: "10.11.0"        # rcc plugin version at last migration

# ----------------------------------------------------------------------
# Release automation
# ----------------------------------------------------------------------
release_automation:
  decision: enabled                   # enabled | declined | deferred
  tool: release-please                # release-please | semantic-release | none
  configured_at: "2026-04-18"
  notes: "release-please chosen for native multi-file JSON bump support"

# ----------------------------------------------------------------------
# Settings file scope — where different kinds of decisions live
# ----------------------------------------------------------------------
settings_scope:
  safety_bypass: .claude/settings.json              # team-shared, checked in
  permissions: .claude/settings.json                # team baseline
  hooks: .claude/settings.json                      # team-enforced
  personal_overrides: .claude/settings.local.json   # gitignored, per-dev
  user_global: ~/.claude/settings.json              # user-wide (all projects)

# ----------------------------------------------------------------------
# Primary model assignments (Opus 4.7 best practices)
# ----------------------------------------------------------------------
models:
  orchestrator:
    model: claude-opus-4-7
    effort: xhigh
  implementer:
    model: sonnet
    effort: high
  reviewer:
    model: sonnet
    effort: medium

# ----------------------------------------------------------------------
# Artifact directories (relative to repo root)
# ----------------------------------------------------------------------
artifacts:
  root: .rcc/
  memory: .rcc/memory/
  validation: .rcc/validation/
  archive: .rcc/archive/
  # timestamped outputs live flat in .rcc/{YYYYMMDD-HHMM}-{kind}.md

